<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#30473a" />
    <title>오프라인 | Your Reader</title>
    <style>
      *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:#f4f1e9;color:#292620;font-family:Arial,"Apple SD Gothic Neo",sans-serif}.card{width:min(420px,100%);padding:42px;border:1px solid #e2ddd2;border-radius:22px;background:#fffefa;box-shadow:0 24px 70px rgba(63,55,43,.08);text-align:center}.mark{display:grid;width:64px;height:64px;margin:0 auto 24px;place-items:center;border-radius:50%;background:#30473a;color:#fffefa;font-family:Georgia,serif;font-size:26px}.label{color:#4e6b5a;font-size:11px;font-weight:800;letter-spacing:.16em}.card h1{margin:14px 0 12px;font-family:Georgia,"Times New Roman",serif;font-size:28px}.card p{margin:0;color:#746f64;line-height:1.7}.card button{margin-top:26px;padding:12px 18px;border:0;border-radius:12px;background:#4e6b5a;color:white;font:inherit;font-weight:700;cursor:pointer}
    </style>
  </head>
  <body>
    <main class="card">
      <div class="mark" aria-hidden="true">Y</div>
      <div class="label">YOUR READER</div>
      <h1>잠시 연결이 끊겼어요</h1>
      <p>작성한 내용은 이 화면에 저장하지 않습니다.<br />인터넷 연결을 확인한 뒤 다시 열어 주세요.</p>
      <button type="button" onclick="location.reload()">다시 연결하기</button>
    </main>
  </body>
</html>
